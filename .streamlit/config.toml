[theme]
base = "dark"
backgroundColor = "#050608"
secondaryBackgroundColor = "#0D0F14"
primaryColor = "#C9A84C"
textColor = "#E8E0D0"
font = "monospace"

[server]
headless = true
enableCORS = false

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = true
toolbarMode = "minimal"
```
